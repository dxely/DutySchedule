plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.dutyschedule'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.dutyschedule"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androix.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androix.constraintlayout:constraintlayout:2.1.4'
}
